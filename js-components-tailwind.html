<!-- OVERLAY -->
<div id="cartOverlay" class="fixed inset-0 bg-black/50 z-[9998] opacity-0 pointer-events-none transition-opacity duration-300"></div>

<!-- SHOPPING CART SIDEBAR -->
<div id="cartSidebar" class="fixed top-0 right-0 w-[400px] max-w-full h-full bg-surface-container-lowest z-[9999] shadow-[0_24px_48px_rgba(15,23,42,0.12)] translate-x-full transition-transform duration-300 flex flex-col">
    <!-- Header -->
    <div class="p-6 border-b border-surface-container flex items-center justify-between bg-surface-container-lowest">
        <div class="flex items-center gap-3 text-primary">
            <span class="material-symbols-outlined text-2xl">shopping_cart</span>
            <h3 class="font-bold text-xl font-['Hanken_Grotesk']">Giỏ hàng</h3>
        </div>
        <button id="cartClose" class="text-on-surface-variant hover:text-error transition-colors p-2 rounded-full hover:bg-surface-container">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>
    
    <!-- Body -->
    <div id="cartItems" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4">
        <!-- Items will be injected by JS -->
        <div class="flex flex-col items-center justify-center h-full text-on-surface-variant gap-4 opacity-50">
            <span class="material-symbols-outlined text-6xl">shopping_basket</span>
            <p>Giỏ hàng của bạn đang trống</p>
            <a href="#products" id="cartEmptyBuyNow" class="mt-2 bg-primary text-on-primary px-6 py-2 rounded-xl font-medium hover:bg-primary-container hover:text-on-primary-container transition-colors">Mua ngay</a>
        </div>
    </div>
    
    <!-- Footer -->
    <div class="p-6 border-t border-surface-container bg-surface-bright">
        <div class="flex justify-between items-center mb-6 font-bold text-lg text-primary">
            <span>Tổng cộng:</span>
            <span id="cartTotal" class="text-error">Liên hệ báo giá</span>
        </div>
        <div class="flex flex-col gap-3">
            <button id="viewFullCartBtn" class="w-full py-3 rounded-xl border border-primary text-primary font-bold hover:bg-primary hover:text-on-primary transition-colors">
                Xem chi tiết giỏ hàng
            </button>
            <button id="zaloOrderBtn" class="w-full py-3 rounded-xl bg-[#0068FF] text-white font-bold hover:bg-[#0054cc] transition-colors flex items-center justify-center gap-2">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" alt="Zalo" class="w-6 h-6">
                Gửi đơn hàng qua Zalo
            </button>
        </div>
    </div>
</div>

<!-- FULL CART PAGE -->
<div id="fullCartPage" class="fixed inset-0 bg-surface-container-lowest z-[10000] hidden flex-col overflow-y-auto">
    <header class="p-4 border-b border-surface-container bg-surface-bright sticky top-0 z-10">
        <div class="container mx-auto px-4 max-w-6xl">
            <button id="fullCartClose" class="flex items-center gap-2 text-primary font-medium hover:text-secondary transition-colors">
                <span class="material-symbols-outlined">arrow_back</span> Quay lại trang chủ
            </button>
        </div>
    </header>
    
    <main class="flex-1 container mx-auto px-4 max-w-6xl py-8">
        <h2 class="text-3xl font-bold text-primary font-['Hanken_Grotesk'] mb-8">Chi tiết giỏ hàng</h2>
        <div class="bg-surface-bright rounded-2xl shadow-[0_4px_20px_rgba(15,23,42,0.04)] overflow-hidden border border-surface-container">
            <!-- Table Header -->
            <div class="hidden md:grid grid-cols-12 gap-4 p-4 border-b border-surface-container bg-surface-container font-bold text-sm text-primary">
                <div class="col-span-1 flex items-center justify-center"><input type="checkbox" id="selectAllItems" class="w-5 h-5 rounded border-outline text-primary focus:ring-primary"></div>
                <div class="col-span-5">Sản phẩm</div>
                <div class="col-span-2 text-center">Đơn Giá</div>
                <div class="col-span-2 text-center">Số lượng</div>
                <div class="col-span-2 text-center">Số tiền</div>
            </div>
            
            <!-- Table Body -->
            <div id="fullCartItems" class="divide-y divide-surface-container">
                <!-- Items injected by JS -->
            </div>
            
            <!-- Table Footer -->
            <div class="p-6 bg-surface-container-low flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-6 text-sm font-medium">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="selectAllItemsFooter" class="w-5 h-5 rounded border-outline text-primary focus:ring-primary">
                        Chọn tất cả
                    </label>
                    <button id="deleteSelected" class="text-error hover:text-on-error-container transition-colors flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">delete</span> Xóa đã chọn
                    </button>
                </div>
                
                <div class="flex items-center gap-6 w-full md:w-auto">
                    <div class="flex-1 md:flex-none text-right">
                        <span class="text-on-surface-variant text-sm mr-2">Tổng thanh toán:</span>
                        <span id="fullCartTotal" class="text-2xl font-bold text-error font-['Hanken_Grotesk']">Liên hệ</span>
                    </div>
                    <button id="fullCartCheckoutBtn" class="bg-primary text-on-primary px-8 py-3 rounded-xl font-bold hover:bg-primary-container hover:text-on-primary-container transition-colors">
                        Mua Hàng
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- PRODUCT LIGHTBOX -->
<div id="productLightbox" class="fixed inset-0 z-[10000] hidden items-center justify-center p-4">
    <div class="lightbox-overlay absolute inset-0 bg-black/80 backdrop-blur-sm cursor-pointer"></div>
    
    <div class="relative bg-surface-container-lowest rounded-2xl shadow-[0_24px_48px_rgba(15,23,42,0.12)] w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden animate-[fade-in-up_0.3s_ease-out]">
        <button class="lightbox-close absolute top-4 right-4 z-10 w-10 h-10 bg-surface-container hover:bg-error hover:text-on-error rounded-full flex items-center justify-center transition-colors">
            <span class="material-symbols-outlined">close</span>
        </button>
        
        <div class="flex flex-col md:flex-row h-full overflow-y-auto">
            <!-- Left: Image -->
            <div class="w-full md:w-1/2 bg-surface-bright relative flex items-center justify-center p-8 min-h-[300px]">
                <button class="prev-btn absolute left-4 w-10 h-10 bg-surface-container-lowest shadow-md rounded-full flex items-center justify-center text-primary hover:bg-primary hover:text-on-primary transition-colors">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                
                <div class="w-full h-full flex items-center justify-center">
                    <img src="" alt="Sản phẩm" id="lightboxMainImg" class="max-w-full max-h-[60vh] object-contain transition-opacity duration-300">
                </div>
                
                <button class="next-btn absolute right-4 w-10 h-10 bg-surface-container-lowest shadow-md rounded-full flex items-center justify-center text-primary hover:bg-primary hover:text-on-primary transition-colors">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>
            
            <!-- Right: Details -->
            <div class="w-full md:w-1/2 p-8 flex flex-col">
                <h2 id="lt-title" class="text-2xl font-bold text-primary font-['Hanken_Grotesk'] mb-2">Tên sản phẩm</h2>
                <div id="lt-price" class="text-xl font-bold text-error mb-6">Giá: Liên hệ</div>
                
                <div class="flex flex-col gap-4 mb-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium text-on-surface-variant">Kích thước:</label>
                        <select id="lt-size" class="p-3 rounded-xl border border-surface-container bg-surface-bright focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow">
                            <option value="s">Size S</option>
                            <option value="m">Size M</option>
                            <option value="l">Size L</option>
                            <option value="xl">Size XL</option>
                        </select>
                    </div>
                    
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium text-on-surface-variant">Số lượng:</label>
                        <div class="flex items-center w-32 border border-surface-container rounded-xl overflow-hidden bg-surface-bright">
                            <button type="button" onclick="changeQty(-1)" class="w-10 h-10 flex items-center justify-center hover:bg-surface-container transition-colors">-</button>
                            <input type="number" id="lt-qty" value="1" min="1" class="flex-1 h-10 text-center border-x border-surface-container bg-transparent outline-none focus:bg-surface-container-lowest">
                            <button type="button" onclick="changeQty(1)" class="w-10 h-10 flex items-center justify-center hover:bg-surface-container transition-colors">+</button>
                        </div>
                    </div>
                </div>
                
                <div id="lightboxThumbs" class="flex gap-2 mb-6 overflow-x-auto pb-2">
                    <!-- Thumbs injected by JS -->
                </div>
                
                <div class="flex-1 overflow-y-auto mb-6 pr-2">
                    <p id="lt-desc" class="text-on-surface-variant leading-relaxed">Mô tả chi tiết sản phẩm sẽ hiện ở đây...</p>
                </div>
                
                <button id="lt-add-to-cart" class="w-full bg-primary text-on-primary py-4 rounded-xl font-bold hover:bg-primary-container hover:text-on-primary-container transition-colors flex items-center justify-center gap-2 mt-auto">
                    <span class="material-symbols-outlined">add_shopping_cart</span>
                    THÊM VÀO GIỎ HÀNG
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    /* Add extra CSS to support the classes toggled by JS */
    #cartSidebar.open { transform: translateX(0); }
    #cartOverlay.open { opacity: 1; pointer-events: auto; }
    
    /* Fade In Up animation for Lightbox */
    @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    /* Make the lightbox visible when shown via JS */
    .product-lightbox { display: none; }
    .product-lightbox[style*="display: flex"] { display: flex !important; }
</style>
